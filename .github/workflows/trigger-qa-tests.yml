name: Trigger QA Cypress Tests

on:
  push:
    branches:
      - main

jobs:
  trigger-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger QA Repo
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.QA_REPO_TOKEN }}" \
          https://api.github.com/repos/TJakkawat/cypress-ci-learning/dispatches \
          -d '{"event_type":"run-cypress-tests"}'
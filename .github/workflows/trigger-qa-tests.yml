name: Trigger QA Cypress Tests

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - main

jobs:
  trigger-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for GitHub Pages deploy
        run: sleep 30

      - name: Trigger QA Repo
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.QA_REPO_TOKEN }}" \
          https://api.github.com/repos/TJakkawat/cypress-ci-learning/dispatches \
          -d '{"event_type":"run-cypress-tests"}'

      - name: Wait for QA Cypress result
        run: |
          echo "Waiting for QA workflow to start..."
          sleep 15

          for i in {1..30}; do
            RESPONSE=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.QA_REPO_TOKEN }}" \
              "https://api.github.com/repos/TJakkawat/cypress-ci-learning/actions/runs?event=repository_dispatch&per_page=1")

            STATUS=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].status')
            CONCLUSION=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].conclusion')
            RUN_URL=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].html_url')

            echo "QA status: $STATUS"
            echo "QA conclusion: $CONCLUSION"
            echo "QA run: $RUN_URL"

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "QA Cypress passed"
                exit 0
              else
                echo "QA Cypress failed"
                exit 1
              fi
            fi

            sleep 10
          done

          echo "QA workflow timeout"
          exit 1